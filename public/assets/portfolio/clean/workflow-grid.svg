      <rect x="268" y="134" width="112" height="112" rx="18" fill="url(#tile)" stroke="#d7e6f2"/>
      <rect x="402" y="134" width="112" height="112" rx="18" fill="url(#tile)" stroke="#d7e6f2"/>
      <rect x="0" y="268" width="112" height="112" rx="18" fill="url(#tile)" stroke="#d7e6f2"/>
      <rect x="134" y="268" width="112" height="112" rx="18" fill="url(#tile)" stroke="#d7e6f2"/>
